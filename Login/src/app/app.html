<form [formGroup]="userForm" class="space-y-4">
    <!-- Username -->
    <app-input
     [label]="'Username'"
     [control]="usernameControl"
     [placeholder]="'Enter your username'"
     [errors]="usernameErrors">
    </app-input>
    <!-- Password -->
    <app-input
     [label]="'Password'"
     [control]="passwordControl"
     [type]="InputType.PASSWORD"
     [placeholder]="'Enter your password'"
     [errors]="passwordErrors">
    </app-input>
    <!-- Remember Checkbox  -->
    <div class="flex items-center justify-between mt-4">
       <div><app-input
         [label]="'Remember me'"
         [control]="rememberControl"
         [type]="InputType.CHECKBOX">
        </app-input></div>
        <div>
        <a href="#" class="text-sm underline">
            Forgot password?
        </a>
        </div>
    </div>
    @if (rememberControl.touched && rememberControl.errors?.['required']) {
    <app-message>
        You must accept this option
    </app-message>
    }
    <div>
    <app-custom-button>Login</app-custom-button>
    </div>
</form>
